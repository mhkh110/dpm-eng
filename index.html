  <script>
lucide.createIcons();

/* ---------- Theme ---------- */
const root=document.documentElement;
function setTheme(t){root.classList.toggle('light',t==='light');localStorage.setItem('misagh-theme',t);
  document.querySelector('#theme-btn i').setAttribute('data-lucide',t==='light'?'sun':'moon');lucide.createIcons();}
setTheme(localStorage.getItem('misagh-theme')||'dark');
document.getElementById('theme-btn').addEventListener('click',()=>setTheme(root.classList.contains('light')?'dark':'light'));

/* ---------- Language ---------- */
let lang=localStorage.getItem('misagh-lang')||'fa';
const faStore=new Map();
function applyLang(){
  root.setAttribute('dir',lang==='fa'?'rtl':'ltr');
  root.setAttribute('lang',lang);
  document.getElementById('lang-btn').textContent = lang==='fa'?'EN':'ЩҒШ§';
  // toggle text on [data-en] elements
  document.querySelectorAll('[data-en]').forEach(el=>{
    if(!faStore.has(el)) faStore.set(el, el.textContent);
    // skip elements whose text is JS-managed (portfolio handled separately)
    if(el.tagName==='INPUT'){ el.placeholder = lang==='fa' ? (el.getAttribute('data-fa-ph')||el.placeholder) : el.getAttribute('data-en'); return;}
    el.textContent = lang==='fa' ? faStore.get(el) : el.getAttribute('data-en');
  });
  renderProjects();
}
// capture Persian input placeholder once SDK applied
window.addEventListener('load',()=>{ setTimeout(()=>{
  const s=document.getElementById('pf-search'); if(s) s.setAttribute('data-fa-ph', s.placeholder);
  applyLang();
},600); });
document.getElementById('lang-btn').addEventListener('click',()=>{lang=lang==='fa'?'en':'fa';localStorage.setItem('misagh-lang',lang);applyLang();});

/* ---------- Loader ---------- */
window.addEventListener('load',()=>setTimeout(()=>document.getElementById('loader').classList.add('done'),2000));

/* ---------- Mobile menu ---------- */
const mm=document.getElementById('mobile-menu');
document.getElementById('menu-btn').addEventListener('click',()=>{mm.classList.remove('hidden');mm.classList.add('flex');});
function closeMenu(){mm.classList.add('hidden');mm.classList.remove('flex');}
document.getElementById('menu-close').addEventListener('click',closeMenu);
mm.querySelectorAll('a').forEach(a=>a.addEventListener('click',closeMenu));

/* ---------- Navbar scroll ---------- */
const nav=document.getElementById('navbar');
window.addEventListener('scroll',()=>{nav.classList.toggle('nav-scrolled',window.scrollY>40);});

/* ---------- Reveal ---------- */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
function observeReveals(){document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));}
observeReveals();

/* ---------- Mouse glow + magnetic ---------- */
const glow=document.getElementById('mouse-glow');
window.addEventListener('mousemove',e=>{glow.style.left=e.clientX+'px';glow.style.top=e.clientY+'px';});
document.querySelectorAll('.btn-mag').forEach(b=>{
  b.addEventListener('mousemove',e=>{const r=b.getBoundingClientRect();const x=e.clientX-r.left-r.width/2;const y=e.clientY-r.top-r.height/2;b.style.transform=`translate(${x*.2}px,${y*.2}px)`;});
  b.addEventListener('mouseleave',()=>b.style.transform='');
});

/* ---------- Starfield ---------- */
const cv=document.getElementById('stars'),ctx=cv.getContext('2d');let stars=[];
function resize(){cv.width=innerWidth;cv.height=innerHeight;stars=Array.from({length:120},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+.2,s:Math.random()*.4+.1}));}
resize();addEventListener('resize',resize);
function draw(){ctx.clearRect(0,0,cv.width,cv.height);const light=root.classList.contains('light');ctx.fillStyle=light?'rgba(40,70,140,.5)':'rgba(255,255,255,.8)';stars.forEach(st=>{st.y-=st.s;if(st.y<0)st.y=cv.height;ctx.globalAlpha=Math.random()*.6+.3;ctx.beginPath();ctx.arc(st.x,st.y,st.r,0,7);ctx.fill();});ctx.globalAlpha=1;requestAnimationFrame(draw);}
if(!matchMedia('(prefers-reduced-motion:reduce)').matches)draw();

let activeCat='all', query='';
const grid=document.getElementById('pf-grid'), tabsEl=document.getElementById('pf-tabs');
function buildTabs(){tabsEl.innerHTML='';CATS.forEach(c=>{const b=document.createElement('button');b.className='glass px-4 py-2 rounded-xl transition'+(c.k===activeCat?' tab-active':'');b.textContent=lang==='fa'?c.fa:c.en;b.onclick=()=>{activeCat=c.k;buildTabs();renderProjects();};tabsEl.appendChild(b);});}
function renderProjects(){
  buildTabs();
  grid.innerHTML='';
  const L=lang;
  const list=PROJECTS.filter(p=>{
    const inCat=activeCat==='all'||p.cat.includes(activeCat);
    const t=(p[L].name+' '+p.tech.join(' ')+' '+p.cat.join(' ')).toLowerCase();
    return inCat && (query===''||t.includes(query.toLowerCase()));
  });
  document.getElementById('pf-empty').classList.toggle('hidden',list.length>0);
  const tpl=document.getElementById('pf-card-tpl');
  list.forEach(p=>{
    const n=tpl.content.cloneNode(true);
    n.querySelector('.pf-cover').src=p.img; n.querySelector('.pf-cover').alt=p[L].name;
    const catObj=CATS.find(c=>c.k===p.cat[0]);
    n.querySelector('.pf-cat').textContent=L==='fa'?catObj.fa:catObj.en;
    n.querySelector('.pf-name').textContent=p[L].name;
    n.querySelector('.pf-short').textContent=p[L].short;
    const tw=n.querySelector('.pf-tech');
    p.tech.forEach(t=>{const s=document.createElement('span');s.className='glass px-2 py-1 rounded text-xs';s.textContent=t;tw.appendChild(s);});
    const art=n.querySelector('article');
    art.classList.add('in');
    const open=()=>openModal(p);
    art.addEventListener('click',open);
    art.addEventListener('keydown',e=>{if(e.key==='Enter')open();});
    grid.appendChild(n);
  });
}
function openModal(p){
  const L=lang, d=p[L];
  document.getElementById('m-cover').src=p.img;
  document.getElementById('m-cover').alt=d.name;
  const catObj=CATS.find(c=>c.k===p.cat[0]);
  document.getElementById('m-cat').textContent=L==='fa'?catObj.fa:catObj.en;
  document.getElementById('m-name').textContent=d.name;
  const labels=L==='fa'?{p:'Щ…ШіШҰЩ„ЩҮ',a:'ШұЩҲЫҢЪ©ШұШҜ',ar:'Щ…Ш№Щ…Ш§ШұЫҢ',o:'ЩҶШӘЫҢШ¬ЩҮ',f:'ШӘЩҲШіШ№ЩҮ ШўШӘЫҢ'}:{p:'Problem',a:'Approach',ar:'Architecture',o:'Outcome',f:'Future Improvements'};
  document.getElementById('m-body').innerHTML=
    `<div><h4 class="font-bold mb-1" style="color:var(--text)">${labels.p}</h4><p class="text-sm leading-7">${d.problem}</p></div>`+
    `<div><h4 class="font-bold mb-1" style="color:var(--text)">${labels.a}</h4><p class="text-sm leading-7">${d.approach}</p></div>`+
    `<div><h4 class="font-bold mb-1" style="color:var(--text)">${labels.ar}</h4><p class="text-sm leading-7">${d.arch}</p></div>`+
    `<div><h4 class="font-bold mb-1" style="color:var(--text)">${labels.o}</h4><p class="text-sm leading-7">${d.outcome}</p></div>`+
    `<div><h4 class="font-bold mb-1" style="color:var(--text)">${labels.f}</h4><p class="text-sm leading-7">${d.future}</p></div>`;
  const mt=document.getElementById('m-tech');mt.innerHTML='';
  p.tech.forEach(t=>{const s=document.createElement('span');s.className='glass px-3 py-1 rounded-lg text-xs';s.textContent=t;mt.appendChild(s);});
  document.getElementById('pf-modal').classList.add('open');
}
document.getElementById('m-close').addEventListener('click',()=>document.getElementById('pf-modal').classList.remove('open'));
document.getElementById('pf-modal').addEventListener('click',e=>{if(e.target.id==='pf-modal')e.target.classList.remove('open');});
document.getElementById('pf-search').addEventListener('input',e=>{query=e.target.value;renderProjects();});
renderProjects();
